<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#1e293b"/>
  
  <!-- Outer Gold Rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#a1824a" stroke-width="10" stroke-dasharray="16 10" opacity="0.6"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#b89047" stroke-width="6"/>
  
  <!-- Premium Gold Gradient Definitions -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e8d2"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="70%" stop-color="#b89047"/>
      <stop offset="100%" stop-color="#866a3a"/>
    </linearGradient>
    <filter id="luxuryShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Monogram Group with Shadow -->
  <g filter="url(#luxuryShadow)">
    <!-- Elegant Interlocking 'S' and 'H' -->
    
    <!-- 'H' - Left pillar -->
    <path d="M 195 150 L 195 362" stroke="url(#goldGrad)" stroke-width="32" stroke-linecap="round"/>
    <!-- 'H' - Right pillar -->
    <path d="M 317 150 L 317 362" stroke="url(#goldGrad)" stroke-width="32" stroke-linecap="round"/>
    <!-- 'H' - Crossbar -->
    <path d="M 195 256 L 317 256" stroke="url(#goldGrad)" stroke-width="28" stroke-linecap="round"/>
    
    <!-- Elegant 'S' weaving through H -->
    <!-- Outer highlight path to give a layered / overlapping look -->
    <path d="M 335 185 C 335 125, 177 125, 177 195 C 177 256, 335 256, 335 317 C 335 387, 177 387, 177 327" 
          fill="none" stroke="#1e293b" stroke-width="26" stroke-linecap="round"/>
          
    <!-- The actual golden S curve -->
    <path d="M 335 185 C 335 125, 177 125, 177 195 C 177 256, 335 256, 335 317 C 335 387, 177 387, 177 327" 
          fill="none" stroke="url(#goldGrad)" stroke-width="16" stroke-linecap="round"/>
          
    <!-- Decorative center diamond node for alignment -->
    <polygon points="256,236 266,256 256,276 246,256" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="3"/>
  </g>
</svg>